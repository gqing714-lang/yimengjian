<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一梦间 — 虚见相</title>
<script>
/* 在页面解析初期载入保存的字体。 */
(() => {
  const SYSTEM_FONT = '"Microsoft YaHei", "PingFang SC", system-ui, sans-serif';

  const state = window.__customFontState = {
    status: 'system',
    url: '',
    name: '',
    message: '当前使用系统字体。',
  };

  const emitState = () => {
    window.dispatchEvent(new CustomEvent('customfontstatechange', {
      detail: { ...state },
    }));
  };

  const setUIFont = (name) => {
    const family = name
      ? `${JSON.stringify(name)}, ${SYSTEM_FONT}`
      : SYSTEM_FONT;

    document.documentElement.style.setProperty('--ui-font', family);
  };

  const verifyFont = async (name) => {
    if (!document.fonts?.load) {
      state.status = 'loaded';
      state.message = `字体样式表已载入：${name}`;
      emitState();
      return;
    }

    try {
      const faces = await document.fonts.load(
        `16px ${JSON.stringify(name)}`,
        '中文字体测试 ABC 123'
      );

      if (faces.length > 0) {
        state.status = 'loaded';
        state.message = `字体已应用：${name}`;
      } else {
        state.status = 'font-error';
        state.message = `样式表已载入，但字体文件没有成功应用：${name}`;
      }
    } catch (error) {
      state.status = 'font-error';
      state.message = `字体文件加载失败：${name}`;
      state.error = String(error);
    }

    emitState();
  };

  try {
    const DEFAULT_FONT_CONFIG = {
      url: "https://cdn.jsdelivr.net/npm/@pixelium/web-vue@0.0.5/dist/fusion-pixel-12px-proportional-zh_hans.ttf.woff2",
      name: "Fusion Pixel 12px Proportional SC",
    };
    const savedFontConfig = localStorage.getItem('galgame_font_config');
    let config = savedFontConfig
      ? JSON.parse(savedFontConfig)
      : DEFAULT_FONT_CONFIG;

    /* 迁移上一版误用的 Latin 子集；它没有中文字形。 */
    const savedUrl = String(config?.url || '').trim();
    if (
      savedUrl.includes('/fusion-pixel-12px-proportional-sc') &&
      savedUrl.includes('/latin-400-normal.')
    ) {
      config = DEFAULT_FONT_CONFIG;
      localStorage.setItem(
        'galgame_font_config',
        JSON.stringify(DEFAULT_FONT_CONFIG)
      );
    }

    const url = String(config?.url || '').trim();
    const name = String(config?.name || '').trim();

    if (!url || !name) {
      setUIFont('');
      return;
    }

    state.status = 'loading';
    state.url = url;
    state.name = name;
    state.message = `正在载入字体：${name}`;
    setUIFont(name);

    const isFontFile = /\.(?:woff2?|woff|ttf|otf)(?:[?#].*)?$/i.test(url);

    if (isFontFile) {
      const style = document.createElement('style');
      style.id = 'custom-font-face';
      style.textContent = [
        '@font-face {',
        `  font-family: ${JSON.stringify(name)};`,
        `  src: url(${JSON.stringify(url)});`,
        '  font-display: swap;',
        '  font-weight: normal;',
        '  font-style: normal;',
        '}',
      ].join('\n');

      document.head.appendChild(style);

      document.addEventListener(
        'DOMContentLoaded',
        () => verifyFont(name),
        { once: true }
      );
      return;
    }

    const link = document.createElement('link');
    link.id = 'custom-font-stylesheet';
    link.rel = 'stylesheet';
    link.href = url;

    link.onload = () => verifyFont(name);

    link.onerror = () => {
      state.status = 'stylesheet-error';
      state.message = '字体 CSS 无法载入，请检查链接或网络。';
      emitState();
    };

    document.head.appendChild(link);
  } catch (error) {
    setUIFont('');
    state.status = 'config-error';
    state.message = '字体设置读取失败，已恢复系统字体。';
    state.error = String(error);
    console.error('字体配置读取失败：', error);
  }
})();
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --avatar-size: 56px;
  --message-gap: 10px;
  --panel-bg: #000;
  --panel-border: #fff;
  --panel-frame-gap: 3px;
  --panel-line: 1px solid var(--panel-border);
  --panel-shadow: 2px 3px 8px rgba(0,0,0,0.2);
  --ui-font: "Fusion Pixel 12px Proportional SC", 'Microsoft YaHei', 'PingFang SC', system-ui, sans-serif;
}

body {
  background: #fff;
  font-family: var(--ui-font);
  font-size: 13px;
  line-height: 1.8;
  letter-spacing: 0.05em;
  color: #fff;
  min-height: 100vh;
}

/* ── Animations ── */
@keyframes cursorFloat {
  0%, 100% { opacity: 0.28; transform: translateY(2px); }
  50% { opacity: 1; transform: translateY(-3px); }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes msgAppear { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

.rpg-btn {
  transition: transform 0.1s ease, opacity 0.1s ease;
  cursor: pointer;
}
.rpg-btn:active {
  transform: scale(0.9);
  opacity: 0.7;
}
.msg-appear { animation: msgAppear 0.4s ease; }
.overlay-bg { animation: fadeIn 0.2s ease; }
.overlay-panel { animation: slideUp 0.25s ease; }
.loading-dots { animation: pulse 1.2s ease infinite; }
.dot-anim { animation: pulse 1.2s ease infinite; display: inline-block; }
.dot-anim.d2 { animation-delay: 0.2s; }
.dot-anim.d3 { animation-delay: 0.4s; }
.message-cursor {
  display: inline-block;
  margin-left: 0.2em;
  font-size: 0.78em;
  line-height: 1;
  opacity: 0.28;
  animation: cursorFloat 1.7s ease-in-out infinite;
  will-change: transform, opacity;
}

@media (prefers-reduced-motion: reduce) {
  .message-cursor { animation: none; opacity: 0.75; }
}

button, input, textarea, select { font-family: var(--ui-font); }
input::placeholder { color: #555; }


/* Unified black frame + inner white line, based on the character message bubble. */
.scenario-btn,
.location-bar,
.scene-box,
.message-bubble,
.input-wrap,
.overlay-box,
.settings-input-wrap,
.connect-btn {
  background: var(--panel-bg);
  padding: var(--panel-frame-gap);
}

.scenario-btn .inner,
.location-inner,
.scene-inner,
.message-bubble .inner,
.input-wrap .inner,
.overlay-content,
.settings-input-wrap .inner,
.connect-btn .inner {
  border: var(--panel-line);
}

/* ── Screens ── */
.screen {
  display: none;
  min-height: 100vh;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 14px;
}
.screen.active { display: flex; }

.container { width: 100%; max-width: 480px; }

/* ── Scenario Select ── */
#select-screen { padding: 24px 16px; }
.select-header { text-align: center; margin-bottom: 24px; }
.select-header .sub { font-size: 10px; color: #999; letter-spacing: 0.2em; margin-bottom: 6px; }
.select-header .title { font-size: 16px; color: #000; letter-spacing: 0.1em; }
.scenario-list { display: flex; flex-direction: column; gap: 8px; }
.scenario-btn {
  border: none; text-align: left; width: 100%;
}
.scenario-btn .inner { padding: 14px 18px; }
.scenario-btn .s-title {
  color: #fff; font-size: 13px; margin-bottom: 4px; letter-spacing: 0.08em;
  font-family: inherit;
}
.scenario-btn .s-desc {
  color: #888; font-size: 11px; line-height: 1.6;
  font-family: inherit;
}

/* ── Chat UI ── */
.top-bar {
  display: flex; justify-content: space-between; margin-bottom: 8px;
}
.icon-btn {
  background: #000; border: none; color: #fff;
  width: 28px; height: 28px; padding: 0;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 2px 3px 8px rgba(0,0,0,0.2);
}

/* Scene Status Bar */
.location-bar {
  margin-bottom: 10px;
  box-shadow: var(--panel-shadow);
}
.location-inner {
  padding: 6px 14px;
  font-size: 11px; color: #888; letter-spacing: 0.12em;
  text-align: center;
}

/* Scene Box */
.scene-box {
  margin-bottom: 16px;
  box-shadow: 0 0 12px rgba(0,0,0,0.25);
}
.scene-inner {
  padding: 20px;
  min-height: 100px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
}
.scene-pagination {
  display: flex; align-items: center; gap: 12px;
  margin-top: 14px; font-size: 11px; color: #888;
}
.scene-pagination span { cursor: pointer; }
.scene-pagination span.disabled { opacity: 0.3; cursor: default; }

/* Shared character / user message UI */
.message-row {
  display: flex; gap: var(--message-gap); align-items: flex-start;
  margin-bottom: 16px;
}
.message-row.user { justify-content: flex-end; }
.avatar-frame {
  width: var(--avatar-size); height: var(--avatar-size);
  border: 2px solid var(--panel-bg); background: #111;
  flex: 0 0 var(--avatar-size); overflow: hidden;
  box-shadow: var(--panel-shadow);
}
.avatar-frame.settings { border-color: var(--panel-border); box-shadow: none; }
.avatar-frame img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.message-lines {
  flex: 1; min-width: 0; display: flex; flex-direction: column;
  gap: 6px; margin-top: 6px;
}
.message-row.user .message-lines {
  flex: 0 1 calc(100% - var(--avatar-size) - var(--message-gap));
  max-width: calc(100% - var(--avatar-size) - var(--message-gap));
  align-items: flex-end;
}
.message-bubble {
  max-width: 100%; box-shadow: var(--panel-shadow);
}
.message-bubble .inner {
  padding: 7px 12px;
  font-size: 12px; line-height: 1.8;
  overflow-wrap: anywhere; white-space: pre-wrap;
}

/* Input */
.input-row { display: flex; gap: 6px; }
.input-wrap {
  flex: 1; box-shadow: var(--panel-shadow);
}
.input-wrap input {
  width: 100%; background: transparent; border: none; outline: none;
  color: #fff; padding: 8px 12px;
  font-family: var(--ui-font);
  font-size: 12px; letter-spacing: 0.05em;
}
.send-btn {
  width: 36px; border: none; background: #000; color: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 16px; padding: 3px;
  box-shadow: 2px 3px 8px rgba(0,0,0,0.2);
}

/* Overlay */
.overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 999;
  align-items: center; justify-content: center; padding: 20px;
}
.overlay.active { display: flex; }
.overlay-box {
  width: 100%; max-width: 420px; max-height: 65vh;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}
.overlay-content {
  padding: 16px; color: #fff;
  font-size: 12px; line-height: 2;
  max-height: calc(65vh - 44px); overflow-y: auto;
}
.log-header { font-size: 10px; color: #666; letter-spacing: 0.15em; margin-bottom: 10px; }
.log-entry {
  padding-bottom: 8px; margin-bottom: 8px;
  border-bottom: 1px solid #333;
}
.log-entry:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.log-entry .label { color: #888; }
.log-entry .label.user { color: #aaa; }

.error-msg { color: #c33; font-size: 11px; margin-bottom: 8px; text-align: center; }

/* Settings */
.settings-group { margin-bottom: 14px; }
.settings-label { font-size: 10px; color: #999; letter-spacing: 0.1em; margin-bottom: 5px; }
.settings-input-wrap { width: 100%; }
.settings-input-wrap input {
  width: 100%; background: transparent; border: none; outline: none;
  color: #fff; padding: 8px 12px; font-family: inherit; font-size: 11px;
  letter-spacing: 0.03em; box-sizing: border-box;
}
.connect-btn {
  border: none; color: #fff; width: 100%;
  cursor: pointer; margin-top: 10px;
}
.connect-btn .inner {
  padding: 8px; text-align: center;
  font-family: inherit; font-size: 12px; letter-spacing: 0.1em;
}
.connect-btn:disabled { opacity: 0.4; cursor: wait; }
.model-list { margin-top: 14px; }
.model-item {
  background: none; border: 1px solid #333; color: #888;
  width: 100%; padding: 8px 12px; text-align: left;
  font-family: inherit; font-size: 11px; cursor: pointer;
  margin-bottom: 4px; transition: all 0.1s ease;
}
.model-item:hover { border-color: #888; color: #fff; }
.model-item.selected { border-color: #fff; color: #fff; background: #222; }
.status-text { font-size: 10px; margin-top: 6px; }
.status-ok { color: #6a6; }
.status-err { color: #c66; }
.settings-section { margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid #333; }
.settings-section:last-of-type { border-bottom: none; }
.settings-section-title { font-size: 12px; color: #fff; letter-spacing: 0.1em; margin-bottom: 10px; }

/* Tabs */
.tab-bar {
  display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid #444;
}
.tab-btn {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: #666; padding: 8px 14px; font-family: inherit; font-size: 11px;
  letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s ease;
}
.tab-btn.active { color: #fff; border-bottom-color: #fff; }
.tab-btn:hover { color: #aaa; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.font-options { display: flex; flex-direction: column; gap: 4px; }
</style>
</head>
<body>

<!-- ═══ Settings Overlay ═══ -->
<div class="overlay" id="settings-overlay">
  <div class="overlay-box overlay-panel" id="settings-box" style="max-width:440px; max-height:80vh;">
    <div class="overlay-content" style="max-height:calc(80vh - 20px); overflow-y:auto; padding:12px;">

      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="tab-connect">连接</button>
        <button class="tab-btn" data-tab="tab-style">文风</button>
        <button class="tab-btn" data-tab="tab-appearance">外观</button>
      </div>

      <!-- Tab: Connect -->
      <div class="tab-content active" id="tab-connect">
        <div class="settings-group">
          <div class="settings-label">端点 URL</div>
          <div class="settings-input-wrap"><div class="inner">
            <input type="text" id="endpoint-input" placeholder="https://api.example.com/v1">
          </div></div>
        </div>
        <div class="settings-group">
          <div class="settings-label">密钥</div>
          <div class="settings-input-wrap"><div class="inner">
            <input type="password" id="apikey-input" placeholder="sk-...">
          </div></div>
        </div>
        <button class="connect-btn rpg-btn" id="btn-connect"><div class="inner">连接</div></button>
        <div id="connect-status"></div>
        <div class="model-list" id="model-list" style="display:none;">
          <div class="settings-label">可用模型</div>
          <div id="model-items"></div>
        </div>
      </div>

      <!-- Tab: Writing Style -->
      <div class="tab-content" id="tab-style">
        <div class="settings-label" style="margin-bottom:8px;">旁白文本风格（保存后生效）</div>
        <textarea id="style-textarea" rows="14" spellcheck="false"
          style="width:100%; background:#111; border:1px solid #444; color:#ccc;
            padding:10px; font-family:inherit; font-size:11px; line-height:1.7;
            resize:vertical; box-sizing:border-box; outline:none;"></textarea>
      </div>

      <!-- Tab: Appearance -->
      <div class="tab-content" id="tab-appearance">
        <!-- Font -->
        <div class="settings-group">
          <div class="settings-section-title">字体</div>
          <div class="settings-group">
            <div class="settings-label">字体链接（CSS / WOFF2 / TTF）</div>
            <div class="settings-input-wrap"><div class="inner">
              <input type="text" id="font-url-input" placeholder="CSS 链接或 .woff2/.woff/.ttf/.otf 直链">
            </div></div>
            <div class="settings-label" style="margin-top:4px; color:#555; font-size:9px;">支持 CSS 样式表或字体文件直链；中文字体必须使用含中文字形的文件</div>
          </div>
          <div class="settings-group">
            <div class="settings-label">字体名称</div>
            <div class="settings-input-wrap"><div class="inner">
              <input type="text" id="font-name-input" placeholder="Fusion Pixel 12px Proportional SC">
            </div></div>
          </div>
          <div class="settings-label" style="margin-top:6px; color:#666; font-size:9px; line-height:1.6;">
            填写返回 CSS 的样式表地址，以及该 CSS 中真实声明的 font-family 名称。保存后刷新页面一次。
          </div>
          <div id="font-status" class="status-text"></div>
        </div>

        <!-- Character Avatar -->
        <div class="settings-group">
          <div class="settings-section-title">角色头像</div>
          <div style="display:flex; gap:10px; align-items:center;">
            <div class="avatar-frame settings">
              <img id="avatar-preview-img" alt="角色头像预览">
            </div>
            <label class="connect-btn rpg-btn" style="display:inline-block; width:auto; margin:0; cursor:pointer;">
              <div class="inner" style="padding:6px 14px; font-size:11px;">上传</div>
              <input type="file" id="avatar-upload" accept="image/*" style="display:none;">
            </label>
          </div>
        </div>

        <!-- User Avatar -->
        <div class="settings-group">
          <div class="settings-section-title">
            用户头像
            <label style="margin-left:10px; font-size:10px; color:#888; cursor:pointer;">
              <input type="checkbox" id="user-avatar-toggle" style="vertical-align:middle;"> 启用
            </label>
          </div>
          <div id="user-avatar-section" style="display:none;">
            <div style="display:flex; gap:10px; align-items:center;">
              <div class="avatar-frame settings">
                <img id="user-avatar-preview" alt="用户头像预览">
              </div>
              <label class="connect-btn rpg-btn" style="display:inline-block; width:auto; margin:0; cursor:pointer;">
                <div class="inner" style="padding:6px 14px; font-size:11px;">上传</div>
                <input type="file" id="user-avatar-upload" accept="image/*" style="display:none;">
              </label>
            </div>
          </div>
        </div>
      </div>

      <button class="connect-btn rpg-btn" id="btn-save-settings" style="margin-top:10px;">
        <div class="inner">保存</div>
      </button>
    </div>
  </div>
</div>

<!-- ═══ Scenario Select ═══ -->
<div id="select-screen" class="screen active">
  <div class="container">
    <div class="select-header">
      <div class="sub">一 梦 间</div>
      <div class="title">虚见相</div>
    </div>
    <!-- Continue from save -->
    <div id="continue-section" style="display:none; margin-bottom:16px;">
      <button class="scenario-btn rpg-btn" id="btn-continue" style="width:100%;">
        <div class="inner" style="border-color:#888; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div class="s-title" id="save-info-title">继续</div>
            <div class="s-desc" id="save-info-desc"></div>
          </div>
          <div style="font-size:18px; color:#fff;">▶</div>
        </div>
      </button>
      <button id="btn-delete-save" style="background:none; border:none; color:#555; font-family:inherit; font-size:9px; cursor:pointer; margin-top:4px; letter-spacing:0.05em;">
        删除存档
      </button>
    </div>

    <div class="settings-label" style="margin-bottom:8px; color:#666;">— 新的开始 —</div>
    <div class="scenario-list" id="scenario-list"></div>
    <div style="margin-top: 16px; text-align: center;">
      <button class="rpg-btn" id="btn-settings" style="background:none; border:none; color:#999; font-family:inherit; font-size:10px; cursor:pointer; letter-spacing:0.1em;">
        ⚙ 设置
      </button>
    </div>
  </div>
</div>

<!-- ═══ Chat UI ═══ -->
<div id="chat-screen" class="screen">
  <div class="container">
    <div class="top-bar">
      <button class="icon-btn rpg-btn" id="btn-back" style="font-size:14px;">◁</button>
      <div style="display:flex; gap:6px;">
        <button class="icon-btn rpg-btn" id="btn-save-game" title="存档">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.5">
            <rect x="2" y="2" width="12" height="12"/>
            <rect x="5" y="2" width="6" height="5"/>
            <rect x="5" y="10" width="6" height="4"/>
          </svg>
        </button>
        <button class="icon-btn rpg-btn" id="btn-chat-settings">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.5">
            <circle cx="8" cy="8" r="3"/>
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4"/>
          </svg>
        </button>
        <button class="icon-btn rpg-btn" id="btn-log">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.5">
          <rect x="2" y="1" width="12" height="14" rx="0"/>
          <line x1="5" y1="5" x2="11" y2="5"/>
          <line x1="5" y1="8" x2="11" y2="8"/>
          <line x1="5" y1="11" x2="9" y2="11"/>
        </svg>
      </button>
    </div>
    </div>

    <div class="location-bar">
      <div class="location-inner" id="location-text"></div>
    </div>

    <div class="scene-box">
      <div class="scene-inner">
        <p id="scene-text"></p>
        <div class="scene-pagination" id="scene-pagination" style="display:none;">
          <span id="page-prev">◁</span>
          <span id="page-info"></span>

function buildSystemPrompt(ctx) {

${CHARACTER_CARD}

当前场景背景：
${ctx}

【回复格式要求】
你必须严格按照以下格式回复。一次回复中可以包含多段旁白和多条台词。

【场景】当前场景状态，格式为：地点・细分位置｜时间或氛围关键词【/场景】
【旁白】第一段叙事描写【/旁白】
【旁白】第二段（如有）【/旁白】
【台词】虚见相的第一句话【/台词】
【台词】第二句话（如有）【/台词】

规则：
- 旁白和台词可以各有多段
- 台词只写虚见相说出的话，不带引号
- 如果虚见相没有说话，可以省略所有【台词】
- 台词保持角色语气：知分寸有礼貌、偶尔敬语、绝不粗鄙、不高兴时阴阳怪气
- 严格遵守ooc_blacklist
- 不要输出用户的行为或对话

【旁白文本风格】
${writingStyle}`;
}

function parseResponse(text) {
  const scenes = [], dialogues = [];
  let location = '';
  let m;
  const lr = /【场景】([\s\S]*?)【\/场景】/;
  const sr = /【旁白】([\s\S]*?)【\/旁白】/g;
  const dr = /【台词】([\s\S]*?)【\/台词】/g;
  const lm = lr.exec(text);
  if (lm) location = lm[1].trim();
  while ((m = sr.exec(text)) !== null) scenes.push(m[1].trim());
  while ((m = dr.exec(text)) !== null) dialogues.push(m[1].trim());
  return { location, scenes, dialogues };
}

let customAvatar = localStorage.getItem('galgame_custom_avatar') || '';

/* ── Settings DOM ── */
const settingsOverlay = document.getElementById('settings-overlay');
const settingsBox = document.getElementById('settings-box');
const endpointInput = document.getElementById('endpoint-input');
const apikeyInput = document.getElementById('apikey-input');
const btnConnect = document.getElementById('btn-connect');
const connectStatus = document.getElementById('connect-status');
const modelList = document.getElementById('model-list');
const modelItems = document.getElementById('model-items');
const btnSettings = document.getElementById('btn-settings');
const btnSaveSettings = document.getElementById('btn-save-settings');
const styleTextarea = document.getElementById('style-textarea');
const avatarUpload = document.getElementById('avatar-upload');
const avatarPreviewImg = document.getElementById('avatar-preview-img');
const userAvatarToggle = document.getElementById('user-avatar-toggle');
const userAvatarSection = document.getElementById('user-avatar-section');
const userAvatarUpload = document.getElementById('user-avatar-upload');
const userAvatarPreview = document.getElementById('user-avatar-preview');
const fontUrlInput = document.getElementById('font-url-input');
const fontNameInput = document.getElementById('font-name-input');
const fontStatus = document.getElementById('font-status');

const DEFAULT_FONT_CONFIG = {
  url: "https://cdn.jsdelivr.net/npm/@pixelium/web-vue@0.0.5/dist/fusion-pixel-12px-proportional-zh_hans.ttf.woff2",
  name: "Fusion Pixel 12px Proportional SC",
};
let fontConfig = JSON.parse(localStorage.getItem('galgame_font_config') || 'null') || DEFAULT_FONT_CONFIG;

/* 自动替换上一版错误的 Latin 字体子集。 */
if (
  String(fontConfig.url || '').includes('/fusion-pixel-12px-proportional-sc') &&
  String(fontConfig.url || '').includes('/latin-400-normal.')
) {
  fontConfig = DEFAULT_FONT_CONFIG;
  localStorage.setItem('galgame_font_config', JSON.stringify(fontConfig));
}

let userAvatarEnabled = localStorage.getItem('galgame_user_avatar_enabled') === 'true';
let userAvatarData = localStorage.getItem('galgame_user_avatar') || '';

endpointInput.value = apiConfig.endpoint;
apikeyInput.value = apiConfig.apiKey;
styleTextarea.value = writingStyle;
fontUrlInput.value = fontConfig.url;
fontNameInput.value = fontConfig.name;
userAvatarToggle.checked = userAvatarEnabled;
userAvatarSection.style.display = userAvatarEnabled ? 'block' : 'none';
if (userAvatarData) userAvatarPreview.src = userAvatarData;

/* Tab switching */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

/* 字体只在页面启动时于 <head> 中加载。
   保存字体设置后刷新页面，避免重复删除、重建样式表。 */
function setFontStatus(message, ok = true) {
  if (!fontStatus) return;
  fontStatus.textContent = message;
  fontStatus.className = `status-text ${ok ? 'status-ok' : 'status-err'}`;
}

function renderFontStatus(event) {
  const state = event?.detail || window.__customFontState || {};
  const ok = ![
    'stylesheet-error',
    'font-error',
    'config-error',
  ].includes(state.status);

  setFontStatus(
    state.message || '正在检查字体状态……',
    ok
  );
}

window.addEventListener('customfontstatechange', renderFontStatus);
renderFontStatus();

/* User avatar toggle */
userAvatarToggle.addEventListener('change', () => {
  userAvatarEnabled = userAvatarToggle.checked;
  userAvatarSection.style.display = userAvatarEnabled ? 'block' : 'none';
});

/* Avatar previews */
function updateAvatarPreview() {
  avatarPreviewImg.src = customAvatar || DEFAULT_CHAR_AVATAR;
}
updateAvatarPreview();

function applyAvatar() {
  const src = customAvatar || DEFAULT_CHAR_AVATAR;
  document.querySelectorAll('.character-avatar').forEach(img => { img.src = src; });
}

/* Open/close settings */
btnSettings.addEventListener('click', () => {
  settingsOverlay.classList.add('active');
  settingsOverlay.classList.add('overlay-bg');
});
settingsOverlay.addEventListener('click', (e) => {
  if (e.target === settingsOverlay) settingsOverlay.classList.remove('active');
});
settingsBox.addEventListener('click', (e) => e.stopPropagation());

/* Connect */
btnConnect.addEventListener('click', async () => {
  const endpoint = endpointInput.value.trim().replace(/\/+$/, '');
  const key = apikeyInput.value.trim();
  if (!endpoint || !key) {
    connectStatus.innerHTML = '<div class="status-text status-err">请填写端点和密钥</div>';
    return;
  }
  btnConnect.disabled = true;
  connectStatus.innerHTML = '<div class="status-text" style="color:#888;">连接中……</div>';
  modelItems.innerHTML = '';
  modelList.style.display = 'none';
  try {
    const res = await fetch(endpoint + '/models', {
      headers: { 'Authorization': 'Bearer ' + key }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const models = (data.data || data).map(m => m.id || m).filter(Boolean).sort();
    if (models.length === 0) throw new Error('未找到可用模型');
    connectStatus.innerHTML = '<div class="status-text status-ok">已连接 · ' + models.length + ' 个模型</div>';
    modelList.style.display = 'block';
    selectedModel = apiConfig.model || '';
    models.forEach(id => {
      const btn = document.createElement('button');
      btn.className = 'model-item';
      btn.textContent = id;
      if (id === selectedModel) btn.classList.add('selected');
      btn.addEventListener('click', () => {
        modelItems.querySelectorAll('.model-item').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedModel = id;
      });
      modelItems.appendChild(btn);
    });
  } catch (err) {
    connectStatus.innerHTML = '<div class="status-text status-err">连接失败：' + err.message + '</div>';
  } finally {
    btnConnect.disabled = false;
  }
});

/* Avatar uploads */
avatarUpload.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => { customAvatar = ev.target.result; updateAvatarPreview(); };
  reader.readAsDataURL(file);
});
userAvatarUpload.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => { userAvatarData = ev.target.result; userAvatarPreview.src = userAvatarData; };
  reader.readAsDataURL(file);
});

/* Save all settings */
btnSaveSettings.addEventListener('click', () => {
  apiConfig = {
    endpoint: endpointInput.value.trim().replace(/\/+$/, ''),
    apiKey: apikeyInput.value.trim(),
    model: selectedModel,
  };
  writingStyle = styleTextarea.value;
  localStorage.setItem('galgame_api_config', JSON.stringify(apiConfig));
  localStorage.setItem('galgame_writing_style', writingStyle);
  const nextFontConfig = {
    url: fontUrlInput.value.trim(),
    name: fontNameInput.value.trim(),
  };
  const fontChanged =
    nextFontConfig.url !== fontConfig.url ||
    nextFontConfig.name !== fontConfig.name;

  fontConfig = nextFontConfig;
  localStorage.setItem('galgame_font_config', JSON.stringify(fontConfig));
  localStorage.setItem('galgame_user_avatar_enabled', userAvatarEnabled);
  if (customAvatar) localStorage.setItem('galgame_custom_avatar', customAvatar);
  if (userAvatarData) localStorage.setItem('galgame_user_avatar', userAvatarData);
  applyAvatar();

  if (fontChanged) {
    location.reload();
    return;
  }

  settingsOverlay.classList.remove('active');
});

/* ── State ── */
let currentScenario = null;
let scenes = [], scenePage = 0;
let currentLocation = '';
let dialogues = [];
let log = [];
let messages = [];
let loading = false;

/* ── DOM refs ── */
const selectScreen = document.getElementById('select-screen');
const chatScreen = document.getElementById('chat-screen');
const scenarioList = document.getElementById('scenario-list');
const sceneText = document.getElementById('scene-text');
const locationText = document.getElementById('location-text');
const scenePagination = document.getElementById('scene-pagination');
const pageInfo = document.getElementById('page-info');
const pagePrev = document.getElementById('page-prev');
const pageNext = document.getElementById('page-next');
const dialogueLines = document.getElementById('dialogue-lines');
const userMsgContainer = document.getElementById('user-msg-container');
const errorContainer = document.getElementById('error-container');
const chatInput = document.getElementById('chat-input');
const logOverlay = document.getElementById('log-overlay');
const logBox = document.getElementById('log-box');
const logEntries = document.getElementById('log-entries');

/* ── Render Scenarios ── */
SCENARIOS.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'scenario-btn rpg-btn';
  btn.innerHTML = `<div class="inner"><div class="s-title">${s.title}</div><div class="s-desc">${s.desc}</div></div>`;
  btn.addEventListener('click', () => startChat(s));
  scenarioList.appendChild(btn);
});

function startChat(scenario) {
  currentScenario = scenario;
  currentLocation = scenario.location || '';
  scenes = [...scenario.scenes];
  dialogues = [...scenario.dialogues];
  scenePage = 0;
  log = scenario.dialogues.map(d => ({ type: 'char', text: d }));
  messages = [{
    role: 'assistant',
    content: '【场景】' + currentLocation + '【/场景】\n'
      + scenario.scenes.map(s => '【旁白】\n' + s + '\n【/旁白】').join('\n')
      + '\n' + scenario.dialogues.map(d => '【台词】\n' + d + '\n【/台词】').join('\n'),
  }];
  loading = false;

  selectScreen.classList.remove('active');
  chatScreen.classList.add('active');
  userMsgContainer.innerHTML = '';
  errorContainer.innerHTML = '';
  renderLocation();
  renderScene();
  renderDialogues(true);
  applyAvatar();
}

/* ── Location ── */
function renderLocation() {
  locationText.textContent = currentLocation;
}

/* ── Scene ── */
function renderScene() {
  sceneText.textContent = scenes[scenePage] || '';
  if (scenes.length > 1) {
    scenePagination.style.display = 'flex';
    pageInfo.textContent = (scenePage + 1) + ' / ' + scenes.length;
    pagePrev.className = scenePage > 0 ? '' : 'disabled';
    pageNext.className = scenePage < scenes.length - 1 ? '' : 'disabled';
  } else {
    scenePagination.style.display = 'none';
  }
}

pagePrev.addEventListener('click', () => {
  if (scenePage > 0) { scenePage--; renderScene(); }
});
pageNext.addEventListener('click', () => {
  if (scenePage < scenes.length - 1) { scenePage++; renderScene(); }
});

/* ── Dialogues ── */
let typingTimers = [];

function clearTypingTimers() {
  typingTimers.forEach(t => clearTimeout(t));
  typingTimers = [];
}

function renderDialogues(stagger) {
  clearTypingTimers();
  dialogueLines.innerHTML = '';

  if (!stagger) {
    dialogues.forEach((line, i) => {
      addDialogueBubble(line, i === dialogues.length - 1);
    });
    return;
  }

  /* Typing rhythm: show lines one by one with dynamic delay */
  let totalDelay = 0;

  dialogues.forEach((line, i) => {
    if (i === 0) {
      /* First line appears immediately with animation */
      typingTimers.push(setTimeout(() => {
        addDialogueBubble(line, i === dialogues.length - 1);
      }, 200));
      totalDelay = 200;
    } else {
      /* Show typing indicator, then the line */
      const prevLen = dialogues[i - 1].length;
      const typingDuration = Math.min(Math.max(prevLen * 60, 800), 3000);
      totalDelay += 400;

      typingTimers.push(setTimeout(() => {
        addTypingIndicator();
      }, totalDelay));

      totalDelay += typingDuration;

      typingTimers.push(setTimeout(() => {
        removeTypingIndicator();
        addDialogueBubble(line, i === dialogues.length - 1);
      }, totalDelay));
    }
  });
}

function addDialogueBubble(text, isLast) {
  const bubble = document.createElement('div');
  bubble.className = 'message-bubble msg-appear';
  bubble.innerHTML = `<div class="inner">${text}${isLast ? ' <span class="message-cursor" aria-hidden="true">◆</span>' : ''}</div>`;
  dialogueLines.appendChild(bubble);
}

function addTypingIndicator() {
  const indicator = document.createElement('div');
  indicator.className = 'message-bubble typing-indicator';
  indicator.innerHTML = '<div class="inner" style="color:#888;"><span class="dot-anim">・</span><span class="dot-anim d2">・</span><span class="dot-anim d3">・</span></div>';
  dialogueLines.appendChild(indicator);
}

function removeTypingIndicator() {
  const indicator = dialogueLines.querySelector('.typing-indicator');
  if (indicator) indicator.remove();
}

function showLoading() {
  dialogueLines.innerHTML = '<div class="message-bubble"><div class="inner"><span class="dot-anim">・</span><span class="dot-anim d2">・</span><span class="dot-anim d3">・</span></div></div>';
}

/* ── User Message ── */
function showUserMsg(text) {
  const row = document.createElement('div');
  row.className = 'message-row user msg-appear';

  const lines = document.createElement('div');
  lines.className = 'message-lines';

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';

  const inner = document.createElement('div');
  inner.className = 'inner';
  inner.textContent = text;

  bubble.appendChild(inner);
  lines.appendChild(bubble);
  row.appendChild(lines);

  if (userAvatarEnabled && userAvatarData) {
    const avatar = document.createElement('div');
    avatar.className = 'avatar-frame';
    const img = document.createElement('img');
    img.src = userAvatarData;
    img.alt = '用户头像';
    avatar.appendChild(img);
    row.appendChild(avatar);
  }

  userMsgContainer.replaceChildren(row);
}

/* ── LOG ── */
function renderLog() {
  logEntries.innerHTML = '';
  if (log.length === 0) {
    logEntries.innerHTML = '<div style="color:#555;">暂无记录。</div>';
    return;
  }
  log.forEach((entry, i) => {
    const div = document.createElement('div');
    div.className = 'log-entry';
    const label = entry.type === 'user' ? 'You' : CHAR_NAME;
    const labelClass = entry.type === 'user' ? 'label user' : 'label';
    div.innerHTML = `<span class="${labelClass}">${label}：</span><span>${entry.text}</span>`;
    logEntries.appendChild(div);
  });
}

document.getElementById('btn-log').addEventListener('click', () => {
  renderLog();
  logOverlay.classList.add('active');
  logOverlay.classList.add('overlay-bg');
});

document.getElementById('btn-chat-settings').addEventListener('click', () => {
  settingsOverlay.classList.add('active');
  settingsOverlay.classList.add('overlay-bg');
});

logOverlay.addEventListener('click', (e) => {
  if (e.target === logOverlay) {
    logOverlay.classList.remove('active');
  }
});
logBox.addEventListener('click', (e) => e.stopPropagation());

/* ── Back ── */
document.getElementById('btn-back').addEventListener('click', () => {
  clearTypingTimers();
  chatScreen.classList.remove('active');
  selectScreen.classList.add('active');
  checkSaveExists();
});

/* ── API Call (OpenAI-compatible) ── */
async function callAPI(msgs, systemPrompt) {
  if (!apiConfig.endpoint || !apiConfig.apiKey || !apiConfig.model) {
    throw new Error('请先在设置中配置 API 连接');
  }
  const openaiMsgs = [
    { role: 'system', content: systemPrompt },
    ...msgs,
  ];
  const response = await fetch(apiConfig.endpoint + '/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiConfig.apiKey,
    },
    body: JSON.stringify({
      model: apiConfig.model,
      max_tokens: 1500,
      messages: openaiMsgs,
    }),
  });
  const data = await response.json();
  if (data.choices && data.choices.length > 0) {
    return data.choices[0].message?.content || '';
  }
  throw new Error(data.error?.message || 'API request failed');
}

/* ── Send ── */
async function handleSend() {
  const msg = chatInput.value.trim();
  if (!msg || loading) return;

  log.push({ type: 'user', text: msg });
  showUserMsg(msg);
  chatInput.value = '';
  loading = true;
  chatInput.disabled = true;
  errorContainer.innerHTML = '';
  showLoading();

  messages.push({ role: 'user', content: msg });

  try {
    const systemPrompt = buildSystemPrompt(currentScenario.context);
    const rawResponse = await callAPI(messages, systemPrompt);
    const parsed = parseResponse(rawResponse);

    if (parsed.location) {
      currentLocation = parsed.location;
      renderLocation();
    }
    if (parsed.scenes.length > 0) {
      scenes = parsed.scenes;
      scenePage = 0;
      renderScene();
    }
    if (parsed.dialogues.length > 0) {
      dialogues = parsed.dialogues;
      renderDialogues(true);
    }

    messages.push({ role: 'assistant', content: rawResponse });
    parsed.dialogues.forEach(d => log.push({ type: 'char', text: d }));
    userMsgContainer.innerHTML = '';
  } catch (err) {
    errorContainer.innerHTML = `<div class="error-msg">${err.message || '请求失败'}</div>`;
    renderDialogues(false);
  } finally {
    loading = false;
    chatInput.disabled = false;
    chatInput.focus();
  }
}

document.getElementById('btn-send').addEventListener('click', handleSend);
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleSend();
});

/* ── Save / Load ── */
function saveGame() {
  const saveData = {
    scenario: currentScenario,
    scenes: scenes,
    scenePage: scenePage,
    location: currentLocation,
    dialogues: dialogues,
    log: log,
    messages: messages,
    timestamp: Date.now(),
  };
  localStorage.setItem('galgame_save', JSON.stringify(saveData));
  /* Flash feedback */
  const btn = document.getElementById('btn-save-game');
  btn.style.opacity = '0.3';
  setTimeout(() => { btn.style.opacity = '1'; }, 300);
}

function loadGame() {
  const raw = localStorage.getItem('galgame_save');
  if (!raw) return false;
  try {
    const save = JSON.parse(raw);
    currentScenario = save.scenario;
    scenes = save.scenes;
    scenePage = save.scenePage || 0;
    currentLocation = save.location || '';
    dialogues = save.dialogues;
    log = save.log || [];
    messages = save.messages || [];
    loading = false;

    selectScreen.classList.remove('active');
    chatScreen.classList.add('active');
    userMsgContainer.innerHTML = '';
    errorContainer.innerHTML = '';
    renderLocation();
    renderScene();
    renderDialogues(false);
    applyAvatar();
    return true;
  } catch (e) {
    return false;
  }
}

function checkSaveExists() {
  const raw = localStorage.getItem('galgame_save');
  if (!raw) {
    document.getElementById('continue-section').style.display = 'none';
    return;
  }
  try {
    const save = JSON.parse(raw);
    document.getElementById('continue-section').style.display = 'block';
    document.getElementById('save-info-title').textContent = '继续：' + (save.scenario?.title || '未知');
    const date = new Date(save.timestamp);
    const timeStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    document.getElementById('save-info-desc').textContent = timeStr + ' · ' + (save.log?.length || 0) + ' 条记录';
  } catch (e) {
    document.getElementById('continue-section').style.display = 'none';
  }
}
checkSaveExists();

document.getElementById('btn-save-game').addEventListener('click', saveGame);

document.getElementById('btn-continue').addEventListener('click', () => {
  loadGame();
});

document.getElementById('btn-delete-save').addEventListener('click', () => {
  if (confirm('确定删除存档？')) {
    localStorage.removeItem('galgame_save');
    checkSaveExists();
  }
});
</script>
